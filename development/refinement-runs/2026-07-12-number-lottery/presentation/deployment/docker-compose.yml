services:
  site:
    image: nginx:1.27-alpine
    container_name: cyberalchemize-site
    restart: unless-stopped
    volumes:
      - ./site:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=${EDGE_NETWORK:-troqar_edge}
      - traefik.http.routers.cyberalchemize.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.cyberalchemize.rule=Host(`${PUBLIC_HOST:?PUBLIC_HOST is required}`)
      - traefik.http.routers.cyberalchemize.tls=true
      - traefik.http.routers.cyberalchemize.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.cyberalchemize.loadbalancer.server.port=80
    networks:
      - edge

networks:
  edge:
    external: true
    name: ${EDGE_NETWORK:-troqar_edge}
