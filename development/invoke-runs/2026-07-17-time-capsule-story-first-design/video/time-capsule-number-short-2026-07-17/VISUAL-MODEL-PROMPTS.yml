prompt_schema_version: '1.0'
package_id: time-capsule-number-short-2026-07-17
primary_aspect_ratio: '16:9'
crop_contract: center 9:16 safe
editorial_text_policy: Generate no precise typography; add written_copy during editing.
assets:
  ASSET-FIELD-01: Deep midnight field with fine orbital geometry and restrained amber, cream, indigo,
    and muted cyan light, matching the existing time-capsule hero artwork.
  ASSET-PARCEL-01: Small folded message parcel with a warm luminous seam, tactile paper-like edges, no
    readable text, no logo, and no token or coin symbolism.
  ASSET-THREAD-01: Thin warm light path belonging to one parcel; many paths may cross and weave but remain
    individually traceable until they enter the capsule.
  ASSET-CAPSULE-01: One radiant circular capsule with concentric brass-like rings, warm white core, and
    precise orbital geometry, consistent across every scene.
  ASSET-FINGERPRINT-01: One concentric geometric light trace formed only after the capsule closes; an
    abstract digital fingerprint without legible data or text.
  ASSET-CLOSING-PULSE-01: One distant public amber pulse that travels from outside the capsule field and
    touches the closed fingerprint once.
  ASSET-TIME-RINGS-01: Three future destination rings reached by separate light paths; exact 2, 5, and
    10-year labels are added in editorial.
prompts:
- segment_id: VID-RTC-001
  title: Not For Today
  visual_mode: generated_video
  timeline_duration_seconds: 5
  generation_clip_seconds: 6
  continuity_assets:
  - ASSET-FIELD-01
  - ASSET-PARCEL-01
  prompt: Cinematic macro shot, 16:9 with all action inside a centered 9:16-safe area. In a dark intimate
    room, one open human hand holds ASSET-PARCEL-01. The folded parcel emits one restrained amber seam
    of light against ASSET-FIELD-01 beginning to appear beyond the hand. Tactile paper, natural skin,
    quiet breathing space, no readable writing, no exact typography, six-second continuous shot.
  negative_prompt: text, letters, logos, coins, tokens, wallet, blockchain icon, cyberpunk neon, magical
    spark explosion, excessive particles, malformed hand, extra fingers, surveillance interface, advertising
    gloss
  camera_and_motion: Slow push from fingertips toward the parcel; the field appears only at the final
    beat.
  transition_in: Fade up from black on the parcel seam.
  transition_out: Parcel light becomes the first point in the next scene.
- segment_id: VID-RTC-002
  title: Who It Can Be For
  visual_mode: generated_video
  timeline_duration_seconds: 12
  generation_clip_seconds: 8
  continuity_assets:
  - ASSET-FIELD-01
  - ASSET-PARCEL-01
  prompt: Four-beat cinematic montage in one 16:9 clip, center-safe for 9:16. Show the same ASSET-PARCEL-01
