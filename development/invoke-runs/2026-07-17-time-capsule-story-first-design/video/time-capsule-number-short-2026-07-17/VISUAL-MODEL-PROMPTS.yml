    human silhouettes without identifiable faces. End on one quiet empty point of ASSET-FIELD-01 where
    no parcel launches. Warm, humane, restrained, no words or generated typography, eight-second source
    clip.
  negative_prompt: text, legible note, romantic cliché, crowd rally, globe network, forced diversity collage,
    token, coin, reward badge, cyberpunk, identifiable celebrity, malformed hands, surveillance camera,
    empty point turning into a parcel
  camera_and_motion: Four gentle match dissolves anchored by the parcel’s amber seam; final frame stays
    still.
  transition_in: First parcel point expands into the dawn mirror.
  transition_out: A different parcel enters from beyond the quiet point.
- segment_id: VID-RTC-003
