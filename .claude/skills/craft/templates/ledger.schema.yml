schema_id: craft.recursive_ledger
schema_version: 0.3.0
status: canonical-first
owner_context_id: CTX-LEDGER
purpose: >
  Define the compatibility entrypoint for Craft recursive ledger schemas. The
  ledger is machine-readable authority; human views and generated indexes are
  derived from it. Layer-specific schemas live under templates/schemas/.

compatibility_versions:
  - 0.2.0
  - 0.3.0

source_artifacts:
  - arcana/craft/SKILL.md
  - arcana/craft/README.md
  - arcana/craft/ARCHITECTURE.md
  - arcana/craft/templates/schemas/ledger-core.schema.yml
  - arcana/craft/templates/schemas/index.schema.yml
  - arcana/craft/examples/product-launch-ledger.yml
  - arcana/craft/examples/platform-governance-ledger.yml
  - development/craft/CRAFT-LEDGER-SCHEMA.yml

schema_stack:
  entrypoint: arcana/craft/templates/ledger.schema.yml
  current_layer_schemas:
    ledger_core: arcana/craft/templates/schemas/ledger-core.schema.yml
    index: arcana/craft/templates/schemas/index.schema.yml
  deferred_layer_schemas:
    interface: arcana/craft/templates/schemas/interface.schema.yml
    route_exchange: arcana/craft/templates/schemas/route-exchange.schema.yml
    projection: arcana/craft/templates/schemas/projection.schema.yml
    row_update: arcana/craft/templates/schemas/row-update.schema.yml
    validation: arcana/craft/templates/schemas/validation.schema.yml
    artifact_manifest: arcana/craft/templates/schemas/artifact-manifest.schema.yml

source_of_truth_policy:
  schema_contract: arcana/craft/templates/ledger.schema.yml
  source_ledger_schema: arcana/craft/templates/schemas/ledger-core.schema.yml
  index_schema: arcana/craft/templates/schemas/index.schema.yml
  human_view: CRAFT.md
  generated_index: .craft/index.json
  notes:
    - YAML owns field names, required fields, enums, and validation rules.
    - Markdown owns only the human-readable view.
    - Generated indexes are rebuildable lookup surfaces, not source authority.
    - Projection, route-exchange, row-update, validation-report, and artifact-manifest schemas are deferred until later slices.

linking_contract:
  row_id_policy: Every row family uses stable IDs and must preserve IDs across view regeneration.
  row_link_shape:
    label: string
    target: string
    kind: row-id|artifact-id|path|section|external
  path_policy: Paths are relative to the Craft scope unless marked [repo-root] or absolute.
  human_anchor_policy:
    context: "#context-<lowercase-id>"
    artifact: "#artifact-<lowercase-id>"
    blocker: "#blocker-<lowercase-id>"
    enabler: "#enabler-<lowercase-id>"
    decision: "#decision-<lowercase-id>"
    gap: "#gap-<lowercase-id>"
  evidence_policy: Evidence may be an artifact ID, receipt ID, path, selector, or link object; prefer artifact IDs when the target is already in the ledger.

index_contract:
  required_ledger_indexes:
    - by_id
    - open_decisions
    - blocking_decisions
    - active_blockers
    - active_gaps
    - next_moves
    - artifacts_by_path
  optional_ledger_indexes:
    - by_family
    - row_selectors
    - pending_by_node
    - reverse_links
    - references
    - evidence_refs
  generated_index_path: .craft/index.json
  generated_index_status: optional-rebuildable-derived
  generated_index_metadata:
    - schema_version
    - ledger_sha256
    - generated_at
    - generator_version
    - source_ledger
  stale_status_values:
    - fresh
    - stale
    - unknown
  rule: Indexes point to row IDs and paths; they must not redefine row content.

