decisions:
  - decision_id: DEC-ECON-STANDALONE-001
    scope_id: CTX-ECON-ROOT
    decision_type: selection
    question: Should the economy resilience research live in a standalone repository with CAV2 as method authority only?
    selected: standalone-repository
    rationale: Prevents CAV2 product authority from being confused with ResonantDAO economy policy. Owned by the CAV2 decision 2026-06-26.
    status: active
    blocking: false
    impact: CAV2 grants only method authority; no token/bounty/governance/payout/launch authority.
  - decision_id: DEC-ECON-LBT-SCOPE-001
    scope_id: CTX-ECON-DEFINITIONS
    decision_type: selection
    question: What triggers REC-C14 mandatory load-bearing-term tracking?
    options:
      - formal-and-claims
      - formal-only
      - every-cited-noun
    default_option: formal-and-claims
    selected: formal-and-claims
    rationale: Catches the treasury/epoch drift class, excludes ordinary prose, stays grep-enforceable.
    status: active
    blocking: false
    impact: Defines the scope the adapter and drift audit enforce.
  - decision_id: DEC-ECON-LEDGER-LOCATION-001
    scope_id: CTX-ECON-ROOT
    decision_type: selection
    question: Where should the work-tracking ledger live?
    options:
      - in-repo-craft
      - extend-arcanum-inventory
      - domainspec-core-arcanum-craft
    default_option: in-repo-craft
    selected: in-repo-craft
    rationale: Keeps the standalone boundary clean; arcanum craft tracks arcanum work, not economy research.
    status: active
    blocking: false
    impact: This ledger.
  - decision_id: DEC-ECON-SWEEP-INLINE-001
    scope_id: CTX-ECON-DEFINITIONS
    decision_type: selection
    question: Handle the load-bearing-term sweep via dispatch or inline?
    options:
      - inline-candidate-defs
      - full-dispatch
      - log-only
    default_option: inline-candidate-defs
    selected: inline-candidate-defs
    rationale: The deterministic adapter collapsed the task to ~12 terms / ~2 candidate defs; a 7-agent dispatch was overkill.
    status: active
    blocking: false
    impact: ER-D27/D28 created inline; no dispatch registered.

