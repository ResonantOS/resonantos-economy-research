notes:
  - Craft ledger for the standalone ResonantOS economy resilience research repository.
  - This ledger tracks research work; it does not promote definitions, constitutions, mechanisms, token/bounty/governance policy, or launch readiness by itself.
  - Paths are relative to the repository root unless absolute. CAV2 paths are external (a separate repo).
  - Detailed per-pass narration lives in .arcanum/inventory/log.md; this ledger is the structured context/gate/blocker/decision view over it.

contexts:
  - context_id: CTX-ECON-ROOT
    parent_id: root
    title: ResonantOS economy resilience research
    purpose: Research a resilient ResonantOS/ResonantDAO economy, source-first, local-research-only, without promoting mechanisms or policy.
    stage: execute
    gate: flag
    next_move: Build NOW-fixture #2 (flow-conservation, formal-TF-1) via the evidence harness; grounding ER-D24/25/26 is its first task.
    owned_artifacts:
      - ART-ECON-LEDGER
      - ART-ECON-VIEW
      - ART-ECON-README
      - ART-ECON-PROGRAM-FINDINGS
    links:
      - label: Definitions and load-bearing-term tracking
        target: CTX-ECON-DEFINITIONS
        kind: row-id
      - label: Track A fixture backlog
        target: CTX-ECON-FIXTURES
        kind: row-id
      - label: CAV2 reciprocal return
        target: CTX-ECON-CAV2-RETURN
        kind: row-id
  - context_id: CTX-ECON-DEFINITIONS
    parent_id: CTX-ECON-ROOT
    title: Definitions spine and load-bearing-term tracking
    purpose: Keep ER-D1..D28 authoritative and keep every load-bearing term tracked under REC-C14 / ER-D23.
    stage: execute
    gate: pass
    next_move: Ground the candidate terms (ER-D24..D28) as fixtures are built; lazy-migrate Lifecycle status onto ER-D1..D22 when each is next touched.
    owned_artifacts:
      - ART-ECON-DEFINITIONS
      - ART-ECON-DEF-INDEX
      - ART-ECON-DRIFT-AUDIT
      - ART-ECON-CONSTITUTION
      - ART-ECON-LBT-ADAPTER
      - ART-ECON-FOUR-SURFACE
    links:
      - label: Load-bearing-term scope decision
        target: DEC-ECON-LBT-SCOPE-001
        kind: row-id
      - label: Candidate grounding blocker
        target: BLK-ECON-CANDIDATE-GROUNDING-001
        kind: row-id
  - context_id: CTX-ECON-FIXTURES
    parent_id: CTX-ECON-ROOT
    title: Track A NOW-fixture backlog
    purpose: Build the four RULE-DECIDABLE-NOW fixtures (flow-conservation, runway-inequality, TF-11, TF-3) as decidable evidence.
    stage: plan
    gate: flag
    next_move: Build flow-conservation (#2) first; runway-inequality (#3) is near-free after; TF-11 (#1) awaits a published adversary class; TF-3 (#4) is the heavy survey.
    owned_artifacts:
      - ART-ECON-PROGRAM-FINDINGS
    links:
      - label: Costly-identity gate blocks per-identity fixtures
        target: BLK-ECON-COSTLY-IDENTITY-001
        kind: row-id
  - context_id: CTX-ECON-CAV2-RETURN
    parent_id: CTX-ECON-ROOT
    title: Reciprocal return to CyberAlchemy v2
    purpose: Offer reusable method/discipline back to CAV2 as candidate evidence (ER-D20 / REC-C13), transferring no authority.
    stage: review-audit
    gate: flag
    next_move: Await CAV2 owner review of the load-bearing-term-tracking handoff; do not promote via cyclic citation.
    owned_artifacts:
      - ART-ECON-CAV2-HANDOFF
    links:
      - label: Standalone-repo decision (CAV2-owned)
        target: DEC-ECON-STANDALONE-001
        kind: row-id

