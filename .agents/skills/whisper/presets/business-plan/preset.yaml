preset:
  id: business_plan
  label: Business Plan
  status: candidate_whisper_preset
  transport: business_plan
  audience_modes:
    - investor_seed
    - lender_financing
    - operating_internal
    - strategic_partner
    - public_impact
    - generic
  output_modes:
    - full_business_plan
    - investor_memo
    - deck_substrate
    - lender_package
    - operating_plan
    - bp_research_substrate

intent:
  objective: >
    Produce a decision-ready business plan or business-plan substrate that
    explains the venture, customer/user problem, offer, market, go-to-market,
    operations, team, financial assumptions, risks, evidence boundary, and next
    witnesses without letting ambition outrun proof.
  reader_reward: >
    The reader should understand what the business is, why it matters, how it
    can work, what is known, what is assumed, what money or action is needed,
    and what evidence would promote or demote the plan.
  compression_rule: >
    Preserve the few claims, assumptions, numbers, risks, and witnesses that
    change a funding, operating, partnership, or continue/stop decision. Move
    extra background into appendix or data-room notes.

resonance_core:
  tone: credible_ambitious_and_evidence_bounded
  voice: operator_founder_or_project_lead
  style_register: clear_decision_memo_with_operating_backbone
  emotional_residue:
    - this_business_has_a_real_customer_or_user_center
    - the_path_to_validation_is_visible
    - the_numbers_are_assumptions_not_magic
    - the_ask_is_tied_to_milestones
  value_signal:
    - concrete_problem_pressure
    - believable_offer_and_market_entry
    - disciplined_financial_assumptions
    - honest_risk_and_evidence_boundary
    - specific_next_witnesses
  forbidden_feels:
    - pitch_theater
    - vague_tam_story
    - unsupported_traction
    - spreadsheet_fantasy
    - compliance_or_certification_by_language
    - everything_is_equally_ready

relevance_core:
  target_public_options:
    - first_investor
    - lender_or_financing_partner
    - internal_operator
    - strategic_partner
    - grant_or_public_impact_reviewer
    - founder_team
  reader_state: >
    Capable but skeptical. The reader needs a coherent plan, a visible evidence
    boundary, and a reason to believe the next milestone is worth funding or
    executing.
  assumed_knowledge: >
    The reader understands basic business terms but should not need private
    context to understand the problem, offer, model, and ask.
  likely_objections:
    - Who specifically needs this?
    - What evidence proves the problem is urgent?
    - What is sold or delivered now?
    - How will customers or users be reached?
    - What assumptions drive the numbers?
    - What could make this fail?
    - What does the requested money or action unlock?
  authority_mode: >
    Evidence-backed business writing. The plan can recommend action and present
    forecasts, but must label assumptions and avoid claiming traction,
    compliance, certification, defensibility, or financial certainty without
    supporting witnesses.

trajectory_core:
  narrative_anchor: >
    Start with one customer/user problem or blocked decision, then show the
    offer, the path to adoption, the operating model, the financial model, and
    the next witnesses that decide whether the plan strengthens or changes.
  introduction_strategy:
    - name_the_customer_or_user
    - name_the_problem_or_blocked_decision
    - state_the_offer_or_project_in_one_sentence
    - preview_the_current_evidence_boundary
  body_parts:
    - document_control
    - executive_summary
    - company_or_project_overview
    - problem_and_customer
    - solution_or_offer
    - market_and_competition
    - go_to_market
    - operations_and_delivery
    - team_and_roles
    - milestones_and_roadmap
    - financial_model
    - funding_or_resource_ask
    - risks_non_claims_and_demotions
    - appendix_or_data_room
    - witness_queue
    - source_trace
  ending_strategy: >
    End with the next concrete decision and witness queue, not with generic
    optimism.
  length:
    full_plan_default_words: 4500-9000
    investor_memo_default_words: 1800-3500
    deck_substrate_default_words: 900-1800
    operating_plan_default_words: 2500-6000
    lender_package_default_words: 3500-8000

audience_mode_overrides:
  investor_seed:
    emphasize:
      - problem_urgency
      - wedge
      - market_entry
      - team_velocity
      - milestones
      - use_of_funds
      - upside_with_evidence_boundary
    require:
      - why_now
      - traction_or_no_traction_label
      - bottom_up_market_entry
      - ask_and_runway
  lender_financing:
    emphasize:
      - repayment_capacity
      - cash_flow
      - collateral_or_security_if_relevant
      - owner_experience
      - use_of_funds
    require:
      - projected_income_statement
      - cash_flow
      - balance_sheet_or_startup_costs
      - break_even
      - debt_service_or_repayment_logic
  operating_internal:
    emphasize:
      - owners
      - milestones
      - kpis
      - delivery_capacity
      - review_cadence
      - variance_response
    require:
      - operating_assumption_register
      - responsibility_matrix
      - monthly_or_stage_review_loop
  strategic_partner:
    emphasize:
      - mutual_value
      - integration_path
      - responsibilities
      - risk_sharing
      - proof_of_fit
    require:
      - partner_ask
      - partner_benefit
      - dependency_boundary
  public_impact:
    emphasize:
      - beneficiaries
      - measurable_impact
      - sustainability
      - governance
      - public_risk_boundary
    require:
      - impact_metrics
      - stakeholder_map
      - sustainability_plan
      - public_non_claims

composition_contract:
  document_control:
    required:
      - plan_type
      - audience_mode
      - venture_or_project_name
      - prepared_date
      - status
      - evidence_standard
      - source_material
  executive_summary:
    required:
      - one_sentence_business
      - customer_or_user
      - problem
      - offer
      - market_entry
      - current_evidence
      - financial_snapshot
      - ask_or_next_decision
      - main_risks
    rule: Draft last, after all assumptions and boundaries are coherent.
  evidence_boundary:
    required:
      - proven_now
      - assumed
      - forecast
      - future_only
      - forbidden_or_non_claimed
  financial_model:
    required:
      - revenue_units
      - pricing_or_funding_logic
      - cost_drivers
      - capacity_constraints
      - cash_timing
      - runway_or_sustainability
      - scenarios
      - sensitivity_tests
      - break_even_or_threshold_logic
  risk_model:
    required:
      - market_risk
      - product_or_delivery_risk
      - operating_risk
      - financial_risk
      - legal_compliance_or_policy_risk
      - evidence_or_claim_risk
      - mitigation
      - demotion_gate
  appendix_or_data_room:
    required:
      - source_trace
      - evidence_registry
      - financial_assumptions
      - customer_or_user_evidence
      - competitor_or_alternative_research
      - team_or_operating_credentials
      - unresolved_gaps

section_guidance:
  executive_summary:
    purpose: Give the reader the whole decision in one page.
    include:
      - what_the_business_does
      - who_it_serves
      - why_the_problem_matters_now
      - how_the_business_will_start
      - what_the_plan_needs
      - what_would_make_it_fail
  problem_and_customer:
    purpose: Ground the plan in one customer/user pressure.
    rule: Prefer a concrete blocked decision, painful workflow, or unmet need over broad market language.
  solution_or_offer:
    purpose: Explain what is sold, delivered, or operated now.
    rule: Separate current offer from roadmap and platform/product thesis.
  market_and_competition:
    purpose: Show the reachable pocket and alternatives.
    rule: Use bottom-up beachhead logic before total-market scale claims.
  go_to_market:
    purpose: Explain how the first customers/users are reached and converted.
    include:
      - channel
      - sales_or_adoption_motion
      - conversion_steps
      - pricing_or_funding_path
      - retention_or_repeat_use_hypothesis
  operations_and_delivery:
    purpose: Prove the plan can be executed.
    include:
      - delivery_flow
      - owners
      - capacity
      - quality_gates
      - review_cadence
      - stop_or_escalation_rules
  financial_model:
    purpose: Make the plan numerate and falsifiable.
    rule: Every projection must trace to a driver, assumption, or measured fact.
  risks_non_claims_and_demotions:
    purpose: Keep confidence credible.
    rule: Every load-bearing claim gets a failure condition or demotion route.
  witness_queue:
    purpose: Turn uncertainty into next work.
    include:
      - next_30_days_or_stage_1
      - next_60_days_or_stage_2
      - next_90_days_or_stage_3
      - promotion_signals
      - demotion_signals

validation:
  required_checks:
    - plan_type_and_audience_mode_are_named
    - first_page_identifies_customer_problem_offer_evidence_boundary_and_ask
    - executive_summary_matches_body_not_wishful_future
    - current_offer_is_separate_from_roadmap
    - market_claims_have_bottom_up_entry_or_are_labeled_assumption
    - traction_claims_have_customer_user_or_revenue_witnesses
    - financial_model_is_driver_based_and_has_sensitivity
    - use_of_funds_or_resource_ask_maps_to_milestones
    - risks_include_demotion_gates
    - compliance_certification_legal_or_policy_claims_are_source_bounded
    - appendix_or_data_room_keeps_evidence_classes_distinct
    - next_witness_queue_has_promotion_and_fail_signals
  fail_conditions:
    - reads_like_a_pitch_deck_when_full_bp_was_requested
    - hides_unproven_claims_in_confident_language
    - uses_top_down_market_size_as_demand_proof
    - forecasts_revenue_without_units_price_costs_capacity_or_cash_timing
    - claims_traction_without_paid_pilots_contracts_users_lois_quotes_or_equivalent_witnesses
    - claims_compliance_certification_audit_readiness_or_legal_status_without_formal_basis
    - presents_appendix_or_data_room_as_proof_instead_of_evidence_registry

output_contract:
  primary_artifact: business-plan.md
  optional_artifacts:
    - investor-memo.md
    - deck-substrate.md
    - operating-plan.md
    - lender-package.md
    - financial-assumptions.md
    - diligence-evidence-registry.md
    - source-trace.md
    - review.html
  next_route_options:
    - revise
    - decision-gate
    - task-session
    - research-dispatch
    - financial-model-build
    - publish-prep
    - deferred
