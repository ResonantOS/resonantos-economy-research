        draft_note: "Keep the translation light: alias names, sigil governs, spell composes, schema exposes."
      - part_id: small_reader_recipe
        target_effect: "Reader can try it immediately."
        draft_note: "Ask for one named workflow, three properties, three methods, one validation check."
      - part_id: honest_limits_and_translation_warning
        target_effect: "Avoid hype and private jargon."
        draft_note: "A model can be useful without being complete; if no one else can enter it, redesign the language."
      - part_id: reflective_close
        target_effect: "Set up the next post without cliffhanger pressure."
        draft_note: "Once an object has properties and methods, a schema can make it portable."

