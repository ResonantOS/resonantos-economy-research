        arcanum_internal_deepening: "Useful as supporting body material, but too narrow as the main route."

  composition_plan_seed:
    working_titles:
      - "After the Name Comes the Object"
      - "A Tool Needs a Name. Then It Needs a Shape."
      - "Object, the First Abstraction"
    recommended_title: "After the Name Comes the Object"
    section_sequence:
      - part_id: bridge_from_draft_02
        target_effect: "Reader recognizes this is the next move, not a reset."
        draft_note: "Open with the prior post's final instruction, then ask what changes when a name becomes object-like."
      - part_id: surprising_problem_name_is_not_model
        target_effect: "Reader feels the gap between pointing at a pattern and understanding it."
        draft_note: "A name helps us point, but it does not tell us structure or action."
      - part_id: one_running_analogy_handle_to_shape
