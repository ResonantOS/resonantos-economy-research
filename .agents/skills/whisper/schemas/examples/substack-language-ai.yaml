      - part_id: core_insight_language_becomes_executable_through_ai
        role: core_insight
        global_candidate_binding: executable_language_research_note
        depends_on:
          - research_context_generative_ai_changes_who_can_operate_on_language
        inputs:
          - trajectory_core
