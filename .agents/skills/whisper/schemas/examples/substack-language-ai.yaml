text_intent_substrate:
  metadata:
    substrate_version: "0.3"
    transport_type: substack_research_post
    next_transport_pressure: fundraising_copy
    artifact_status: pareto_schema_enforced
    source_packet: "20260526T204134Z-language-ai-substack"

  source_context:
    raw_author_intent: "language and generative AI let people create personal code through names, aliases, schemas, meta-schemas, and workflow capture"
    ai_result: "Generative AI makes language feel newly executable: people can name, schema, alias, and compose their own symbolic tools, giving non-engineers a way to create personal code for understanding and shaping their work."
    live_example: "Arcanum aliases and sigils compress workflows into memorable named handles"
    citation_gap:
      reference: "Yuval Noah Harari, Sapiens, gossip / shared fictions frame"
      status: "checked_paraphrase_only"
      use_policy: "safe paraphrase may be used after the reader-grounded opening; direct quote or page citation remains blocked until exact source verification"

  author_objective:
    primary_outcome: clarify
    desired_reader_change: "AI-curious creative builders see language as a tool-making medium, not only a communication layer"
    success_signal: "reader can imagine naming one of their own workflows, creating an alias for it, and using AI to evolve it into a reusable symbolic tool"
    author_stance: exploratory

  resonance_core:
    tone: "wonder with operational seriousness"
    voice: "essayistic research note from inside an active tool-making practice"
    style_register: essayistic
    emotional_residue: "the reader feels that language is newly available as a creative instrument"
    value_signal: "symbolic agency should not belong only to engineers, academics, or institutions"
    forbidden_feels:
      - "generic AI hype"
      - "language mysticism without concrete mechanics"
      - "software-engineer superiority"
      - "private jargon that excludes the reader"

  relevance_core:
    target_public: "AI-curious creative builders"
    secondary_public: "Arcanum research collaborators"
    reader_state: curious
    domain: "generative AI, language, creative tooling, workflow design, symbolic systems"
    authority_mode: research_group
    assumed_knowledge:
      - "basic awareness that generative AI can work with natural language"
      - "interest in creative process, tool-making, or personal knowledge systems"
      - "no requirement to understand software syntax"
    likely_objections:
      - "Is this just a fancy way to talk about prompting?"
      - "Is language really code, or is that only a metaphor?"
      - "Will personal symbolic systems become unreadable private jargon?"
      - "Can non-engineers create useful tools without technical syntax?"
    reader_reward: "a practical mental model for turning words, names, and schemas into reusable creative tools"

  trajectory_core:
    narrative_anchor: "Arcanum as a live example of language becoming a tool-making medium"
    transport_type: substack_research_post
    introduction_strategy: tension
    body_parts:
      - reader_grounded_opening_hook
      - harari_shared_fiction_bridge
      - research_context_generative_ai_changes_who_can_operate_on_language
      - core_insight_language_becomes_executable_through_ai
      - arcanum_example_aliases_sigils_schemas
      - implications_for_personal_code
      - invitation_to_name_a_workflow
    ending_strategy: invitation
    max_characters: 9000
    must_include:
      - "language as coordination and compression"
      - "naming as a primitive tool-making act"
      - "aliases as workflow capture"
      - "schemas and meta-schemas as ways to shape behavior"
      - "generative AI as collaborator in evolving personal symbolic systems"
      - "Arcanum as example, not product pitch"
    must_avoid:
      - "claiming natural language replaces engineering"
      - "precise Harari claim without verification"
      - "overstating AI as magic"
      - "collapsing all domains into software metaphors"

  transport_schema:
    transport_id: substack_research_post
    transport_category: research_publication
    target_context: "Substack post for an Arcanum research group"
    next_transport_pressure: fundraising_copy
    length_words:
      min: 800
      max: 1600
    max_characters: 9000
    introduction_required: true
    opening_contract:
      first_paragraph_role: reader_grounded_hook
      purpose: "make the reader feel the concrete act of naming, workflow capture, or language-as-handle before external authority appears"
      must_start_with:
        - "a concrete reader-facing situation, question, or tension"
        - "language, naming, words, or workflow experience before any external authority"
      must_not_start_with:
        - "named external authority"
        - "book or title citation"
        - "abstract thesis statement detached from the reader"
      external_reference_policy:
        placement: after_reader_grounded_hook
        allowed_after_paragraph: 3
        external_reference_terms:
          - "Yuval"
          - "Harari"
          - "Sapiens"
        harari_use: "bridge, not opening sentence"
      validation_rules:
        first_paragraph_cannot_match:
          - "(?i)^\\s*(yuval|harari|sapiens|in\\s+sapiens|as\\s+harari)"
          - "(?i)^\\s*(a\\s+book|the\\s+book|one\\s+theory)"
        first_paragraph_must_include_any:
          - "name"
          - "naming"
          - "workflow"
          - "language"
          - "words"
          - "story"
          - "stories"
        draft_must_include_anywhere:
          - "generative AI"
          - "Arcanum"
          - "alias"
          - "schema"
          - "workflow"
        failure_message: "Open from the reader's lived symbolic action first; introduce Harari only after the reader has a local handle."
    evidence_policy: "at least one concrete example, observed pattern, or verified research claim"
    call_to_action_policy: "soft invitation, not conversion pressure"
    required_body_parts:
      - body_part_id: reader_grounded_opening_hook
        responsibility: "open with a concrete reader-facing experience of naming, workflow capture, or language becoming a handle"
      - body_part_id: harari_shared_fiction_bridge
        responsibility: "bridge to Harari's shared-fiction / cooperation frame after the reader-grounded hook, using paraphrase only"
      - body_part_id: research_context_generative_ai_changes_who_can_operate_on_language
        responsibility: "situate the article inside a live research practice without becoming internal-only"
      - body_part_id: core_insight_language_becomes_executable_through_ai
        responsibility: "state the central claim in repeatable form"
      - body_part_id: arcanum_example_aliases_sigils_schemas
        responsibility: "translate Arcanum primitives as examples of personal symbolic tooling"
      - body_part_id: implications_for_personal_code
        responsibility: "show what changes for builders, writers, researchers, and creators"
      - body_part_id: invitation_to_name_a_workflow
        responsibility: "leave the reader with a concrete reflective action"
    validation_checks:
      - pareto_tournament_completeness
      - opening_contract_compliance
      - objective_fit
      - audience_fit
      - resonance_fit
      - structure_completeness
      - arcanum_translation_clarity
      - constraint_compliance
      - citation_integrity

  scu_candidate_set:
    tournament_mode: pareto_aware
    optimization_categories:
      - resonance
      - relevance
      - trajectory
    candidate_sets:
      - candidate_set_id: executable_language_research_note
        resonance_candidate: invitation_to_name_a_workflow
        relevance_candidate: arcanum_as_live_case
        trajectory_candidate: language_as_executable_medium
        expected_strength: "balanced wonder, concrete Arcanum example, and clear movement toward reader agency"
        tradeoff: "requires careful translation so Arcanum terms do not become private jargon"
      - candidate_set_id: anthropological_bridge_first
        resonance_candidate: wonder_with_historical_depth
        relevance_candidate: harari_gossip_bridge
        trajectory_candidate: shared_language_to_personal_code
        expected_strength: "connects AI language tooling to a broader human story"
        tradeoff: "blocked until citation integrity is verified"
      - candidate_set_id: practical_prompting_reframe
        resonance_candidate: operational_clarity
        relevance_candidate: builder_how_to_frame
        trajectory_candidate: workflow_alias_to_schema
        expected_strength: "gives readers immediate utility"
        tradeoff: "risks sounding like a prompting tutorial instead of a research post"
    pareto_consensus:
      selected_candidate_set: executable_language_research_note
      rationale: "best non-dominated balance across resonance, relevance, and trajectory for the first Substack proof"
      rejected_dominance_notes:
        anthropological_bridge_first: "strong relevance bridge but citation gap makes it costlier and riskier"
        practical_prompting_reframe: "strong usefulness but weakens the larger claim about language as symbolic agency"

  pareto_tournament:
    tiering: two_tier
    objective_scale:
      min: 1
      max: 5
      higher_is_better: true
    objectives:
      - id: resonance
        source_core: resonance_core
        question: "Does this create the intended emotional residue?"
      - id: relevance
        source_core: relevance_core
        question: "Does this fit the target public, transport, and context?"
      - id: trajectory
        source_core: trajectory_core
        question: "Does this move the narrative cleanly?"
    hard_gates:
      - id: opening_contract_compliance
        required_for: selected_candidate
      - id: citation_integrity
        required_for: selected_candidate
      - id: audience_legibility
        required_for: selected_candidate
    candidate_protocol:
      each_candidate_must_define:
        - technique_stack
        - target_reader_effect
        - expected_strengths
        - known_tradeoffs
        - failure_modes
        - part_sequence
        - objective_scores
        - hard_gate_results
      dominance_rule: "Reject a candidate only when another candidate is equal or better on all objectives and strictly better on at least one while passing the same hard gates."
      consensus_rule: "Select a non-dominated candidate that best matches author_objective; preserve rejected candidates as reusable alternatives."
      part_level_policy:
        mini_tournament_triggers:
          - delegated
          - revised
          - validation_failed
        default_behavior: "do not run part-level tournaments for every paragraph"
    candidates:
      - candidate_set_id: executable_language_research_note
        technique_stack:
          - language_as_executable_medium
          - arcanum_as_live_case
          - invitation_to_name_a_workflow
        target_reader_effect: "AI-curious creative builders see language as a tool-making medium they can inspect, name, and reuse."
        expected_strengths:
          - "balanced wonder and operational seriousness"
          - "clear Arcanum live example without product-pitch pressure"
          - "reader agency through a concrete naming invitation"
        known_tradeoffs:
          - "requires translation so Arcanum terms do not become private jargon"
        failure_modes:
          - "too much internal vocabulary"
          - "central metaphor becomes abstract without examples"
        part_sequence:
          - reader_grounded_opening_hook
          - harari_shared_fiction_bridge
          - research_context_generative_ai_changes_who_can_operate_on_language
          - core_insight_language_becomes_executable_through_ai
          - arcanum_example_aliases_sigils_schemas
          - implications_for_personal_code
          - invitation_to_name_a_workflow
        objective_scores:
          resonance: 5
          relevance: 5
          trajectory: 5
        hard_gate_results:
          opening_contract_compliance: pass
          citation_integrity: pass
          audience_legibility: pass
      - candidate_set_id: anthropological_bridge_first
        technique_stack:
          - harari_gossip_bridge
          - language_as_executable_medium
          - arcanum_as_live_case
        target_reader_effect: "Readers enter through a recognizable public human-coordination frame before seeing Arcanum."
        expected_strengths:
          - "strong external relevance bridge"
          - "historical depth for language as shared fiction"
        known_tradeoffs:
          - "risks starting with external authority instead of reader-grounded action"
          - "citation care is costlier than the first draft needs"
        failure_modes:
          - "opening contract violation"
          - "essay becomes about Harari rather than personal symbolic agency"
        part_sequence:
          - harari_shared_fiction_bridge
          - reader_grounded_opening_hook
          - research_context_generative_ai_changes_who_can_operate_on_language
          - core_insight_language_becomes_executable_through_ai
          - arcanum_example_aliases_sigils_schemas
          - implications_for_personal_code
          - invitation_to_name_a_workflow
        objective_scores:
          resonance: 4
          relevance: 5
          trajectory: 3
        hard_gate_results:
          opening_contract_compliance: block
          citation_integrity: pass
          audience_legibility: pass
      - candidate_set_id: practical_prompting_reframe
        technique_stack:
          - arcanum_as_live_case
          - language_as_executable_medium
          - invitation_to_name_a_workflow
        target_reader_effect: "Readers get immediate utility by reframing personal workflows as promptable, named patterns."
        expected_strengths:
          - "high practical clarity"
          - "fast reader activation"
        known_tradeoffs:
          - "may sound like a prompting tutorial instead of a research post"
          - "weakens the broader symbolic-agency claim"
        failure_modes:
          - "generic AI advice"
          - "insufficient wonder or conceptual lift"
        part_sequence:
          - reader_grounded_opening_hook
          - arcanum_example_aliases_sigils_schemas
          - research_context_generative_ai_changes_who_can_operate_on_language
          - core_insight_language_becomes_executable_through_ai
          - harari_shared_fiction_bridge
          - implications_for_personal_code
          - invitation_to_name_a_workflow
        objective_scores:
          resonance: 3
          relevance: 5
          trajectory: 4
        hard_gate_results:
          opening_contract_compliance: pass
          citation_integrity: pass
          audience_legibility: pass
    consensus:
      selected_candidate_set: executable_language_research_note
      selected_because: "It is non-dominated among candidates that pass the hard gates and best matches the author objective of clarifying language as personal symbolic code."
      rejected_alternatives:
        - candidate_set_id: anthropological_bridge_first
          preserved_as: "external-reference bridge variant"
          reason_rejected: "strong relevance but fails opening_contract_compliance when used as the opening strategy"
        - candidate_set_id: practical_prompting_reframe
          preserved_as: "utility-first transport variant"
          reason_rejected: "strong relevance and usefulness, but lower resonance for a research-group Substack post"

  technique_stack:
    candidates:
      - candidate_id: language_as_executable_medium
        attached_core: trajectory
        technique: "central reframing"
        reason_selected: "turns the article from AI enthusiasm into a sharp claim about symbolic agency"
        tradeoff: "needs examples so it does not sound abstract"
      - candidate_id: arcanum_as_live_case
        attached_core: relevance
        technique: "concrete live example"
        reason_selected: "shows aliases, sigils, and schemas as working primitives"
        tradeoff: "must translate internal terms for readers outside Arcanum"
      - candidate_id: invitation_to_name_a_workflow
        attached_core: resonance
        technique: "reader activation"
        reason_selected: "gives AI-curious builders an immediate way to test the idea"
        tradeoff: "should stay invitational, not instructional-heavy"
      - candidate_id: harari_gossip_bridge
        attached_core: relevance
        technique: "anthropological bridge"
        reason_selected: "connects shared language to human coordination if verified"
        tradeoff: "must remain bracketed until citation integrity is satisfied"
    selected:
      - language_as_executable_medium
      - arcanum_as_live_case
      - invitation_to_name_a_workflow

  validation:
    checks:
      - objective_fit
      - audience_fit
      - resonance_fit
      - structure_completeness
      - arcanum_translation_clarity
      - constraint_compliance
      - citation_integrity
    review_mode: operator_review

  composition_plan:
