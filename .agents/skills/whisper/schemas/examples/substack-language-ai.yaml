          - relevance_core
        output: markdown_section
        mini_tournament_triggers:
          - delegated
          - revised
          - validation_failed
        must_do:
          - "use Harari as a paraphrased bridge after the opening hook"
          - "connect shared stories to symbolic coordination"
        must_not_do:
          - "use a direct quote or page citation without exact verification"
        validation:
          - citation_integrity
          - external_reference_placement
      - part_id: research_context_generative_ai_changes_who_can_operate_on_language
        role: research_context
        global_candidate_binding: executable_language_research_note
        depends_on:
          - reader_grounded_opening_hook
          - harari_shared_fiction_bridge
        inputs:
          - author_objective
          - relevance_core
        output: markdown_section
        mini_tournament_triggers:
          - delegated
          - validation_failed
        must_do:
