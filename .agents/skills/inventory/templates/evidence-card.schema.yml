$schema: https://json-schema.org/draft/2020-12/schema
$id: inventory.evidence-card.v0.2
title: Inventory Evidence Card
type: object
additionalProperties: true
required:
  - id
  - schema_version
  - profile
  - card_type
  - title
  - summary
  - source_refs
  - authority_level
  - tags
  - selection_reason
  - captured
  - promotion_status
  - promotion_owner
  - updated_at
properties:
  id:
    type: string
    pattern: ^inventory[.]card[.][A-Za-z0-9._-]+$
  schema_version:
    const: inventory.evidence-card.v0.2
  profile:
    enum:
      - full
      - minimal
  card_type:
    enum:
      - source-summary
      - concept
      - method
      - claim
      - question
      - context
      - relation-candidate
      - contradiction-candidate
      - operational-lesson
  title:
    type: string
    minLength: 1
  summary:
    type: string
    minLength: 1
  source_refs:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - path
        - selector
        - selector_type
      properties:
        path:
          type: string
          minLength: 1
        selector:
          type: string
          minLength: 1
        selector_type:
          enum:
            - file
            - heading
            - line-span
            - anchor
            - query
            - fragment
        start_line:
          type: integer
          minimum: 1
        end_line:
          type: integer
          minimum: 1
        fragment_kind:
          enum:
            - section
            - heading
            - line
            - symbol
            - commit
            - clause
            - region
            - other
  authority_level:
    enum:
      - raw-source
      - session-evidence
      - discovery-baseline
      - inventory-knowledge
      - ontology-candidate
      - downstream-governed-ref
  tags:
    type: array
    items:
      type: string
  selection_reason:
    type: string
    minLength: 1
  captured:
    type: object
    required:
      - by
      - at
      - source_stage
    properties:
      by:
        enum:
          - human
          - agent
          - tool
      at:
        type: string
      tool_or_command:
        type: string
      source_stage:
        enum:
          - context-builder
          - invoke-define
          - distill
          - invoke-design
          - pilot
          - manual
          - other
  promotion_status:
    enum:
      - captured
      - candidate
      - proposed
      - promoted
      - rejected
      - superseded
      - blocked
  promotion_owner:
    enum:
      - none
      - inventory
      - ontology-vault
      - definitions-governance
      - context-builder
      - invoke
      - repository-harness
      - other
  governed_ref:
    type: string
  handoff_targets:
    type: array
    items:
      enum:
        - ontology-vault
        - definitions-governance
        - context-builder
        - invoke
        - repository-harness
  related_cards:
    type: array
    items:
      type: string
  claim_shape:
    type: object
  trace:
    type: array
  residue:
    type: object
  open_questions:
    type: array
    items:
      type: string
  updated_at:
    type: string
allOf:
  - if:
      properties:
        profile:
          const: full
    then:
      required:
        - handoff_targets
        - trace
  - if:
      properties:
        promotion_status:
          enum:
            - promoted
            - rejected
            - superseded
            - blocked
    then:
      not:
        properties:
          promotion_owner:
            const: none
